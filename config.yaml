  title: "Do News and Social Media Tell the Same Story?"
  institution: "Cardiff University (Wu et al., 2026)"
  nodes_total: 34
  date_range: ["2019-09-30", "2024-10-17"]  # paper-stated
  observations_total_T: 1319  # paper-stated
  magnificent_seven: 
