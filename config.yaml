# ------------------------------------------------------------------------------
# 0) REPRODUCIBILITY / DETERMINISM CONTROLS
# ------------------------------------------------------------------------------
reproducibility:
  global_random_seed: 123456  # UNSPECIFIED IN MANUSCRIPT: required to reproduce stochastic imputation + bootstrap
  rng_library: "numpy.random.Generator(PCG64)"  # UNSPECIFIED IN MANUSCRIPT: explicit RNG engine to prevent drift
  seed_partitioning:
    imputation_noise_seed_offset: 10000  # UNSPECIFIED IN MANUSCRIPT
    markov_bootstrap_seed_offset: 20000  # UNSPECIFIED IN MANUSCRIPT

# ------------------------------------------------------------------------------
# 1) UNIVERSE DEFINITION AND METADATA [Ref: Sections 1, 4.1, Appendix B]
# ------------------------------------------------------------------------------
